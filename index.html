<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tharun K | Author</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#0d0d0d;
            color:white;
        }

        .hero{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
            padding:20px;
        }

        h1{
            font-size:70px;
            letter-spacing:3px;
        }

        p{
            margin-top:20px;
            font-size:22px;
            color:#d3d3d3;
        }

        .btn{
            margin-top:40px;
            display:inline-block;
            padding:15px 35px;
            background:#d4af37;
            color:black;
            text-decoration:none;
            border-radius:50px;
            font-weight:bold;
            transition:.3s;
        }

        .btn:hover{
            transform:scale(1.08);
        }

        @media(max-width:768px){
            h1{
                font-size:42px;
            }

            p{
                font-size:18px;
            }
        }
    </style>
</head>

<body>

<section class="hero">

<div>

<h1>THARUN K</h1>

<p>
Stories that stay with you long after the final page.
</p>

<a href="#" class="btn">Explore My Books</a>

</div>

</section>

</body>
</html>
